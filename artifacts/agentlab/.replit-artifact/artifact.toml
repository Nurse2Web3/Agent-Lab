kind = "web"
previewPath = "/"
title = "AI AgentLab"
version = "1.0.0"
id = "artifacts/agentlab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22632
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agentlab run dev"

[services.env]
PORT = "22632"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agentlab", "run", "build"]
publicDir = "artifacts/agentlab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
